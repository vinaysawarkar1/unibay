# Local development stack for UNIBAY.
# Usage:
#   docker compose up -d        # start postgres
#   docker compose logs -f db   # tail logs
#   docker compose down         # stop (data persists in the volume)
#   docker compose down -v      # stop AND wipe the DB volume
#
# The same image (postgres:16-alpine) runs in production, so behaviour matches
# what your deployed server will see.

services:
  db:
    image: postgres:16-alpine
    container_name: unibay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: unibay
      POSTGRES_PASSWORD: unibay_local_dev
      POSTGRES_DB: unibay
      # Use C collation to avoid locale issues in alpine
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    ports:
      - '5432:5432'
    volumes:
      - unibay_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U unibay -d unibay']
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional: a lightweight admin UI at http://localhost:8080
  # Comment out if you do not want it.
  adminer:
    image: adminer:latest
    container_name: unibay-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  unibay_pgdata:
    name: unibay_pgdata
